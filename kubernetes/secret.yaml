# Kubernetes Secret holding the application's sensitive environment
# variables. Names are kept IDENTICAL to the application's .env file:
#   DATABASE_URL, JWT_SECRET, NEXTAUTH_URL
#
# This manifest uses `stringData` (plain-text values) for readability and
# ease of editing. Kubernetes stores Secret data Base64-encoded internally
# and converts stringData -> data automatically on apply.
#
# SECURITY NOTE: Do not commit real production secrets to source control.
# For production, prefer creating this Secret imperatively, e.g.:
#
#   kubectl create secret generic kpk-citizen-portal-secret \
#     --namespace kpk-citizen-portal \
#     --from-literal=DATABASE_URL='postgresql://postgres:12345@postgres:5432/citizen_portal?connection_limit=5&pool_timeout=30' \
#     --from-literal=JWT_SECRET='pakistan-citizen-portal-super-secret-key-2026' \
#     --from-literal=NEXTAUTH_URL='http://localhost:3000' \
#     --from-literal=POSTGRES_PASSWORD='12345'
#
# or manage it via a secrets manager (Sealed Secrets, External Secrets
# Operator, Vault, etc.) instead of checking this file in as-is.
apiVersion: v1
kind: Secret
metadata:
  name: kpk-citizen-portal-secret
  namespace: kpk-citizen-portal
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:12345@postgres:5432/citizen_portal?connection_limit=5&pool_timeout=30"
  JWT_SECRET: "pakistan-citizen-portal-super-secret-key-2026"
  NEXTAUTH_URL: "http://localhost:3000"
  # Used only by postgres-deployment.yaml to set the PostgreSQL superuser
  # password (must match the password embedded in DATABASE_URL above).
  POSTGRES_PASSWORD: "12345"
