apiVersion: v1
kind: Service
metadata:
  name: kpk-citizen-portal-service
  namespace: kpk-citizen-portal
  labels:
    app: kpk-citizen-portal
spec:
  type: LoadBalancer
  selector:
    app: kpk-citizen-portal
  ports:
    - port: 3000
      targetPort: 3000
      # nodePort: 30080   # Optional: pin a specific port in the 30000-32767
      #                     range. If omitted, Kubernetes assigns one
      #                     automatically (check it with `kubectl get svc`).
      protocol: TCP
      name: http
