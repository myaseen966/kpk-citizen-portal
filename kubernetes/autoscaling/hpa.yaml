# Automatically scales the kpk-citizen-portal Deployment between 2 and 6
# replicas based on CPU utilization. Requires the Kubernetes
# "metrics-server" add-on to be installed in the cluster (most managed
# Kubernetes offerings — EKS, GKE, AKS, DOKS — include it by default or
# offer it as a one-click add-on; minikube needs `minikube addons enable
# metrics-server`).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kpk-citizen-portal-hpa
  namespace: kpk-citizen-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kpk-citizen-portal
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
