apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kpk-citizen-portal
  labels:
    app: postgres
spec:
  type: ClusterIP # Internal-only; the database should never be exposed externally.
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
